<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>shop2tax — Selbstgehostete Buchhaltung für Kleinunternehmer</title>
  <meta name="description" content="Selbstgehostete Open-Source Buchhaltung für deutsche Kleinunternehmer.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', ui-sans-serif, system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      min-height: 100vh;
    }

    .grid {
      display: grid;
      min-height: 100vh;
    }

    @media (min-width: 1024px) {
      .grid { grid-template-columns: 1fr 1fr; }
    }

    /* Left: Brand panel */
    .brand-panel {
      position: relative;
      overflow: hidden;
      background: #1e3a5f;
      display: none;
      flex-direction: column;
      justify-content: space-between;
    }

    @media (min-width: 1024px) {
      .brand-panel { display: flex; }
    }

    .brand-panel .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(48px);
    }

    .brand-panel .blob-1 {
      width: 384px; height: 384px;
      top: -80px; left: -80px;
      background: rgba(30, 64, 175, 0.4);
    }

    .brand-panel .blob-2 {
      width: 320px; height: 320px;
      bottom: 0; right: 0;
      background: rgba(30, 58, 138, 0.3);
    }

    .brand-panel .blob-3 {
      width: 256px; height: 256px;
      left: 33%; top: 50%;
      background: rgba(29, 78, 216, 0.2);
    }

    .brand-content {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      justify-content: center;
      flex: 1;
      padding: 0 48px;
    }

    @media (min-width: 1280px) {
      .brand-content { padding: 0 64px; }
    }

    .brand-content svg { width: 48px; height: 48px; color: #93c5fd; }

    .brand-content h1 {
      margin-top: 24px;
      font-size: 2.25rem;
      font-weight: 700;
      letter-spacing: -0.025em;
      color: #fff;
    }

    @media (min-width: 1280px) {
      .brand-content h1 { font-size: 3rem; }
    }

    .brand-content p {
      margin-top: 12px;
      max-width: 384px;
      font-size: 1.125rem;
      line-height: 1.625;
      color: rgba(191, 219, 254, 0.8);
    }

    .brand-footer {
      position: relative;
      z-index: 10;
      padding: 0 48px 32px;
    }

    @media (min-width: 1280px) {
      .brand-footer { padding: 0 64px 32px; }
    }

    .brand-footer p {
      font-size: 0.875rem;
      color: rgba(96, 165, 250, 0.6);
    }

    /* Right: Content panel */
    .content-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #fafaf9;
      padding: 0 24px;
    }

    .content-inner {
      width: 100%;
      max-width: 384px;
      text-align: center;
    }

    .content-inner > * + * { margin-top: 32px; }

    /* Mobile brand header */
    .mobile-brand { display: block; }

    @media (min-width: 1024px) {
      .mobile-brand { display: none; }
    }

    .mobile-brand svg {
      width: 48px; height: 48px;
      margin: 0 auto 16px;
      color: #2563eb;
    }

    .mobile-brand h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.025em;
      color: #44403c;
    }

    /* Desktop heading */
    .desktop-heading { display: none; }

    @media (min-width: 1024px) {
      .desktop-heading { display: block; }
    }

    .desktop-heading h2 {
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -0.025em;
      color: #44403c;
    }

    .desktop-heading p {
      margin-top: 8px;
      color: #78716c;
    }

    /* GitHub button */
    .github-button {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 14px 24px;
      font-size: 1rem;
      font-weight: 500;
      font-family: inherit;
      color: #fff;
      background: #1c1c1c;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      text-decoration: none;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
      transition: background 150ms ease;
    }

    .github-button:hover { background: #333; }

    .github-button svg { width: 20px; height: 20px; fill: #fff; }

    /* License link */
    .license-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.875rem;
      color: #a8a29e;
      text-decoration: none;
      transition: color 150ms ease;
    }

    .license-link:hover { color: #57534e; }

    .license-link svg { width: 16px; height: 16px; }
  </style>
